services:
  - type: web
    name: automation-ui-dashboard
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: your-super-secret-jwt-key-change-this-in-production
      # Database variables (optional - app works with mock data)
      - key: DB_HOST
        value: localhost
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: password
      - key: DB_NAME
        value: bms_dashboard
